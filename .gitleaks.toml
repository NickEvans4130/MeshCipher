# Gitleaks configuration for MeshCipher
# https://github.com/gitleaks/gitleaks

title = "MeshCipher Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted files and patterns"

paths = [
    '''\.gradle''',
    '''\.idea''',
    '''build/''',
    '''schemas/''',
    '''\.png$''',
    '''\.jpg$''',
    '''\.gif$''',
]

# Allow test files to contain mock keys/tokens
regexTarget = "match"
regexes = [
    '''test.*\.kt$''',
    '''androidTest.*\.kt$''',
]

# Don't flag UUIDs (used for BLE service UUIDs)
[[rules]]
id = "uuid-allowlist"
description = "Allow UUIDs"
regex = '''[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'''
allowlist = { regexTarget = "match", regexes = ['''.*''']}
